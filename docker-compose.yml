version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"
    networks:
      - backend

  jaeger:
    image: jaegertracing/all-in-one:1.48
    ports:
      - "16686:16686"
    networks:
      - backend

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - backend

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - backend

  users-service:
    build: ./src/UsersService
    depends_on:
      - postgres
    environment:
      POSTGRES_CONNECTION: ${POSTGRES_CONNECTION}
    networks:
      - backend

  transactions-publisher:
    build: ./src/TransactionsPublisher
    depends_on:
      - rabbitmq
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
    networks:
      - backend

  transactions-consumer:
    build: ./src/TransactionsConsumer
    depends_on:
      - rabbitmq
      - postgres
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      POSTGRES_CONNECTION: ${POSTGRES_CONNECTION}
    networks:
      - backend

  recurring-transactions-service:
    build: ./src/RecurringTransactionsService
    environment:
      POSTGRES_CONNECTION: ${POSTGRES_CONNECTION}
    networks:
      - backend

  currency-conversion-service:
    build: ./src/CurrencyConversionService
    networks:
      - backend

  exchange-rate-service:
    build: ./src/ExchangeRateService
    networks:
      - backend

  api-gateway:
    build: ./src/ApiGateway
    ports:
      - "8080:80"
    networks:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    networks:
      - backend

  database-migrator:
    build: ./src/DatabaseMigrator
    depends_on:
      - postgres
    environment:
      POSTGRES_CONNECTION: ${POSTGRES_CONNECTION}
    networks:
      - backend

volumes:
  db-data:

networks:
  backend:
    driver: bridge
